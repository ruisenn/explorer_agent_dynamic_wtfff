<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agent Console</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p>THE GRAND DEMO</p>
        <h1>Agent Console</h1>
      </div>
      <div class="connection">
        <span id="connectionDot"></span>
        <b id="connectionText">连接中</b>
        <em id="runState" data-state="idle">IDLE</em>
      </div>
    </header>

    <main class="workspace">
      <section class="browser-panel">
        <form id="runForm" class="task-form">
          <label>
            目标网址
            <input id="startUrl" type="url" value="http://127.0.0.1:3100/sandbox" required />
          </label>
          <label class="goal-field">
            任务
            <input
              id="goal"
              value="在这里写goal！！！"
              required
            />
          </label>
          <label class="toggle-field">
            <input id="useScreenshot" type="checkbox" checked />
            <span>发送截图</span>
          </label>
          <button id="runButton" type="submit">运行 Agent</button>
        </form>

        <div class="browser-toolbar">
          <div>
            <strong id="statusTitle">尚未运行</strong>
            <span id="statusMessage">READY</span>
          </div>
          <button id="stopButton" class="stop-button" type="button" disabled>停止</button>
        </div>

        <div class="browser-viewport">
          <img id="browserFrame" alt="Playwright 浏览器画面" hidden />
          <div id="emptyFrame" class="empty-frame">
            <strong>PLAYWRIGHT</strong>
            <span>等待浏览器画面</span>
          </div>
        </div>
      </section>

      <aside class="timeline-panel">
        <div class="timeline-heading">
          <div>
            <p>AGENT EVENTS</p>
            <h2>交互记录</h2>
          </div>
          <button id="clearButton" type="button">清空</button>
        </div>
        <ol id="timeline">
          <li class="timeline-empty">？？？2333</li>
        </ol>
      </aside>
    </main>

    <div id="toast" role="status" hidden></div>
    <script src="/app.js" defer></script>
  </body>
</html>
